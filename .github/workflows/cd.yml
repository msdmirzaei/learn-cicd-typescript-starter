name: cd

on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                node-version: 22
            
            - name: Install dependencies
              run: npm install
            
            - name: ‌Build
              run: npm run build

            - name: Authenticate to google cloud
              uses: 'google-github-actions/auth@v2'
              with:
                credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
              
            - name: set up cloud sdk
              uses: 'google-github-actions/setup-gcloud@v3'

            - name: build and push to the google cloud
              run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-497714/notely-ar-repo/notely:lastest .

            - name: Deploy to Cloud Run
              run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-497714/notely-ar-repo/notely:lastest --region us-central1 --allow-unauthenticated --project notely-497714 --max-instances=4
            


